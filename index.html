<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Manager</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    .card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
    .row { display: flex; gap: 5px; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<h2>Inventory Manager</h2>

<input id="name" placeholder="Product name">
<input id="qty" type="number" placeholder="Starting quantity">
<button onclick="addProduct()">Add Product</button>

<div id="list"></div>

<script>
let items = JSON.parse(localStorage.getItem("inventory") || "[]");

function save() {
  localStorage.setItem("inventory", JSON.stringify(items));
  render();
}

function addProduct() {
  const name = document.getElementById("name").value;
  const qty = parseInt(document.getElementById("qty").value) || 0;

  if (!name) return;

  items.push({ id: Date.now(), name, quantity: qty });
  save();

  document.getElementById("name").value = "";
  document.getElementById("qty").value = "";
}

function removeProduct(id) {
  items = items.filter(i => i.id !== id);
  save();
}

function changeQty(id, amount) {
  items = items.map(i =>
    i.id === id ? { ...i, quantity: i.quantity + amount } : i
  );
  save();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${item.name}</b><br>
      Qty: ${item.quantity}
      <div class="row">
        <button onclick="changeQty(${item.id},1)">+1</button>
        <button onclick="changeQty(${item.id},-1)">-1</button>
        <button onclick="removeProduct(${item.id})">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
